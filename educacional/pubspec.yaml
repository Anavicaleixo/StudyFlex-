name: educacional
description: Plataforma de streaming educacional e entretenimento para comunidade acadêmica
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  go_router: ^13.0.0
  intl: ^0.18.1
  google_fonts: ^6.2.1 
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  youtube_player_iframe: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png